name: Release

on:
  push:
    branches: [release]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  MIX_ENV: local
  ELIXIR_VERSION: "1.20.1"
  OTP_VERSION: "29.0.2"
  # OTP 29+ dropped 32-bit Windows ERTS; 28.5.0.2 is the last line with a
  # win32 build. The x86 installer is compiled AND bundled on this OTP.
  OTP_VERSION_WIN32: "28.5.0.2"
  ZIG_VERSION: "0.15.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 32-bit Windows ──────────────────────────────────────────────────────
  # Built in isolation on OTP 28.5.0.2 (see OTP_VERSION_WIN32). Burrito's
  # default ERTS resolver fetches otp_win32_<host-OTP>.exe, so running this
  # job on OTP 28 yields a consistent win32 ERTS + OTP-28 bytecode. The
  # resulting installer is handed to the release job as an artifact.
  build_win32:
    name: Build Windows 32-bit installer
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Zig
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: zig-linux-x86_64-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/zig
          ZIG_URL=$(curl -fsSL https://ziglang.org/download/index.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['${{ env.ZIG_VERSION }}']['x86_64-linux']['tarball'])")
          echo "Downloading Zig from: $ZIG_URL"
          curl -fSL "$ZIG_URL" | tar -xJ --strip-components=1 -C ~/.local/zig
          ~/.local/zig/zig version

      - name: Add Zig to PATH
        run: echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Setup Erlang & Elixir (OTP 28 for win32)
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION_WIN32 }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build/local
          key: build-local-win32-${{ runner.os }}-otp${{ env.OTP_VERSION_WIN32 }}-elixir${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'config/*.exs') }}
          restore-keys: |
            build-local-win32-${{ runner.os }}-otp${{ env.OTP_VERSION_WIN32 }}-elixir${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}-
            build-local-win32-${{ runner.os }}-otp${{ env.OTP_VERSION_WIN32 }}-elixir${{ env.ELIXIR_VERSION }}-

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq nsis xz-utils

      - name: Download VC++ Redistributable (x86)
        run: |
          curl -fSL -o rel/packaging/resources/VC_redist.x86.exe \
            "https://aka.ms/vs/17/release/vc_redist.x86.exe"
          ls -lh rel/packaging/resources/VC_redist.x86.exe

      - name: Install Elixir dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Build assets
        run: mix assets.deploy

      - name: Build 32-bit Windows release
        env:
          BURRITO_WIN32: "1"
        run: mix release

      - name: Verify 32-bit installer
        run: |
          ls -lh burrito_out
          INSTALLER=$(ls burrito_out/PaperLandDojo-*-windows-x86-setup.exe 2>/dev/null | head -1)
          test -n "$INSTALLER" || { echo "::error::Missing Windows x86 (32-bit) installer"; exit 1; }
          echo "Built: $INSTALLER"

      - name: Upload 32-bit installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-installer
          path: burrito_out/PaperLandDojo-*-windows-x86-setup.exe
          if-no-files-found: error
          retention-days: 1

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build_win32

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from mix.exs
        id: version
        run: |
          VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists. Bump the version in mix.exs before pushing to release."
            exit 1
          fi

      - name: Cache Zig
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: zig-linux-x86_64-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/zig
          ZIG_URL=$(curl -fsSL https://ziglang.org/download/index.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['${{ env.ZIG_VERSION }}']['x86_64-linux']['tarball'])")
          echo "Downloading Zig from: $ZIG_URL"
          curl -fSL "$ZIG_URL" | tar -xJ --strip-components=1 -C ~/.local/zig
          ~/.local/zig/zig version

      - name: Add Zig to PATH
        run: echo "$HOME/.local/zig" >> "$GITHUB_PATH"

      - name: Setup Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build/local
          key: build-local-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'config/*.exs') }}
          restore-keys: |
            build-local-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}-
            build-local-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq nsis genisoimage xz-utils

      - name: Download VC++ Redistributable (x64)
        run: |
          curl -fSL -o rel/packaging/resources/VC_redist.x64.exe \
            "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          ls -lh rel/packaging/resources/VC_redist.x64.exe

      - name: Install Elixir dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Build assets
        run: mix assets.deploy

      - name: Build release
        run: mix release

      - name: Download 32-bit Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-x86-installer
          path: burrito_out

      - name: Rename artifacts to conventional names
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd burrito_out
          [ -f dojo_linux ] && mv dojo_linux "dojo-${VERSION}-linux-x86_64"
          echo "=== Release artifacts ==="
          ls -lh

      - name: Verify artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          test -f "burrito_out/dojo-${VERSION}-linux-x86_64" || { echo "::error::Missing Linux binary"; exit 1; }
          test -f "burrito_out/PaperLandDojo-${VERSION}-windows-x86_64-setup.exe" || { echo "::error::Missing Windows x86_64 installer"; exit 1; }
          test -f "burrito_out/PaperLandDojo-${VERSION}-windows-x86-setup.exe" || { echo "::error::Missing Windows x86 (32-bit) installer"; exit 1; }
          test -f "burrito_out/PaperLandDojo-${VERSION}-macos-x86_64.dmg" || { echo "::error::Missing macOS x86_64 DMG"; exit 1; }
          test -f "burrito_out/PaperLandDojo-${VERSION}-macos-arm64.dmg" || { echo "::error::Missing macOS ARM64 DMG"; exit 1; }
          echo "All artifacts verified."

      - name: Sign Windows artifacts (optional)
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        env:
          CODE_SIGN_CERT: ${{ secrets.CODE_SIGN_CERT }}
          CODE_SIGN_KEY: ${{ secrets.CODE_SIGN_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sudo apt-get install -yq osslsigncode
          echo "$CODE_SIGN_CERT" | base64 -d > /tmp/cert.pem
          echo "$CODE_SIGN_KEY" | base64 -d > /tmp/key.pem
          for LABEL in x86_64 x86; do
            INSTALLER="burrito_out/PaperLandDojo-${VERSION}-windows-${LABEL}-setup.exe"
            [ -f "$INSTALLER" ] || { echo "Skipping sign — $INSTALLER not found"; continue; }
            osslsigncode sign -certs /tmp/cert.pem -key /tmp/key.pem \
              -n "PaperLand Dojo" -t http://timestamp.digicert.com \
              -in "$INSTALLER" -out "${INSTALLER}.signed"
            mv "${INSTALLER}.signed" "$INSTALLER"
          done
          rm -f /tmp/cert.pem /tmp/key.pem

      - name: Create git tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Dojo $TAG" \
            --generate-notes \
            "burrito_out/dojo-${VERSION}-linux-x86_64" \
            "burrito_out/PaperLandDojo-${VERSION}-windows-x86_64-setup.exe" \
            "burrito_out/PaperLandDojo-${VERSION}-windows-x86-setup.exe" \
            "burrito_out/PaperLandDojo-${VERSION}-macos-x86_64.dmg" \
            "burrito_out/PaperLandDojo-${VERSION}-macos-arm64.dmg"

